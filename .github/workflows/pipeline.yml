name: CareerAgentPro CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

jobs:
  # ============================================
  # Frontend CI
  # ============================================
  frontend-ci:
    name: 🎨 Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      
      - name: 📚 Install dependencies
        run: npm install
      
      - name: 🔍 Lint check
        run: npm run lint
      
      - name: 🏗️ Build application
        run: npm run build
        env:
          # Ensure build doesn't fail on warnings
          CI: true
      
      - name: 📊 Report bundle size
        run: |
          echo "## 📦 Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d ".next" ]; then
            echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|" >> $GITHUB_STEP_SUMMARY
            find .next/static -name "*.js" -exec ls -lh {} \; | awk '{print "| " $NF " | " $5 " |"}' | head -10 >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================
  # Backend CI
  # ============================================
  backend-ci:
    name: 🐍 Backend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: 📚 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 🔍 Syntax check
        run: python -m py_compile main.py
      
      - name: 🔍 Type checking (optional)
        continue-on-error: true
        run: |
          pip install mypy
          mypy main.py --ignore-missing-imports || true
      
      - name: 📊 Report
        run: |
          echo "## 🐍 Backend Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Python version: $(python --version)" >> $GITHUB_STEP_SUMMARY
          echo "✅ Dependencies installed: $(pip list --format=freeze | wc -l) packages" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Deployment Readiness Check
  # ============================================
  deploy-ready:
    name: 🚀 Deployment Readiness
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
      
      - name: ✅ Validate vercel.json
        run: |
          if [ ! -f vercel.json ]; then
            echo "❌ vercel.json missing!"
            exit 1
          fi
          python3 -c "import json; json.load(open('vercel.json'))" && echo "✅ vercel.json is valid JSON"
      
      - name: ✅ Check required files
        run: |
          echo "Checking required files..."
          files=("frontend/package.json" "frontend/next.config.ts" "backend/main.py" "backend/requirements.txt" "vercel.json")
          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              echo "✅ $file exists"
            else
              echo "❌ $file missing!"
              exit 1
            fi
          done
      
      - name: 📊 Deployment Summary
        run: |
          echo "## 🚀 Deployment Ready" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Build | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Build | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Vercel Config | ✅ Valid |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎉 Ready to deploy to Vercel!" >> $GITHUB_STEP_SUMMARY
